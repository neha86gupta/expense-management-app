<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SpendWise – Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #f5f0e8;
            --surface: #ede8df;
            --card:    #ffffff;
            --ink:     #1a1410;
            --muted:   #8a7f72;
            --border:  #ddd8ce;
            --rust:    #c4502a;
            --rust-lt: #f0e8e3;
            --gold:    #c49a2a;
            --sage:    #4a7c5f;
            --shadow:  rgba(26,20,16,0.10);
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Cabinet Grotesk', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 999; opacity: 0.5;
        }

        .page { max-width: 820px; margin: 0 auto; }

        /* Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            animation: rise 0.4s ease both;
        }
        .logo-mark {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.4rem; font-weight: 700;
            letter-spacing: -0.04em; color: var(--ink);
        }
        .logo-mark em { color: var(--rust); font-style: normal; }

        .back-link {
            display: flex; align-items: center; gap: 0.4rem;
            text-decoration: none;
            font-size: 0.85rem; font-weight: 700;
            color: var(--muted);
            border: 1.5px solid var(--border);
            border-radius: 10px; padding: 0.5rem 1rem;
            transition: all 0.18s;
            font-family: 'Clash Display', sans-serif;
        }
        .back-link:hover { border-color: var(--ink); color: var(--ink); background: var(--surface); }

        .page-title {
            font-family: 'Clash Display', sans-serif;
            font-size: 2.6rem; font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 0.3rem;
            animation: rise 0.4s 0.05s ease both; opacity: 0;
        }
        .page-sub {
            color: var(--muted); font-size: 0.88rem;
            margin-bottom: 2rem;
            animation: rise 0.4s 0.1s ease both; opacity: 0;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Notice banner */
        .notice {
            background: var(--rust-lt);
            border: 1px solid #e0c0b0;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            color: var(--rust);
            margin-bottom: 2rem;
            display: flex; align-items: center; gap: 0.5rem;
            animation: rise 0.4s 0.15s ease both; opacity: 0;
        }

        /* Loading spinner */
        .loader {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 5rem 1rem; gap: 1rem; color: var(--muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--rust);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Month section ── */
        .month-section {
            margin-bottom: 2.8rem;
            animation: rise 0.5s ease both; opacity: 0;
        }

        .month-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--ink);
        }
        .month-name-wrap { display: flex; align-items: center; gap: 0.6rem; }
        .month-name {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.4rem; font-weight: 700;
            letter-spacing: -0.03em;
        }
        .current-tag {
            background: var(--ink); color: var(--bg);
            font-size: 0.62rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 0.25rem 0.6rem; border-radius: 20px;
        }
        .month-total-big {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            color: var(--rust); letter-spacing: -0.03em;
        }

        /* Stats strip */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
            margin-bottom: 1rem;
        }
        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.9rem 1rem;
        }
        .stat-lbl { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
        .stat-val { font-family: 'Clash Display', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--ink); }
        .stat-val.rust { color: var(--rust); }
        .stat-val.sage { color: var(--sage); }
        .stat-val.gold { color: var(--gold); }

        /* Category pills */
        .cat-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
        .cat-pill {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.28rem 0.75rem;
            font-size: 0.74rem; color: var(--muted); font-weight: 500;
        }
        .cat-pill b { color: var(--ink); }

        /* Expense table */
        .exp-table { display: flex; flex-direction: column; gap: 0.5rem; }

        .exp-row {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.85rem 1.1rem;
            display: flex; align-items: center;
            justify-content: space-between; gap: 1rem;
            transition: border-color 0.18s, transform 0.18s;
        }
        .exp-row:hover { border-color: var(--rust); transform: translateX(3px); }

        .exp-left { display: flex; align-items: center; gap: 0.8rem; }
        .exp-icon {
            width: 36px; height: 36px; background: var(--surface);
            border-radius: 9px; display: flex; align-items: center;
            justify-content: center; font-size: 1.05rem; flex-shrink: 0;
        }
        .exp-name { font-weight: 700; font-size: 0.93rem; }
        .exp-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

        .exp-right { display: flex; align-items: center; gap: 0.8rem; }
        .exp-amount {
            font-family: 'Clash Display', sans-serif;
            font-size: 1.05rem; font-weight: 700;
            color: var(--rust); white-space: nowrap;
        }
        .del-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 7px; color: var(--muted);
            cursor: pointer; font-size: 0.75rem;
            padding: 0.28rem 0.55rem;
            transition: all 0.18s;
        }
        .del-btn:hover { border-color: var(--rust); color: var(--rust); background: var(--rust-lt); }

        /* Empty state */
        .empty {
            text-align: center; padding: 2.5rem 1rem;
            color: var(--muted); font-size: 0.88rem;
        }
        .empty .big { font-size: 2rem; margin-bottom: 0.5rem; }

        /* No data at all */
        .no-data {
            text-align: center; padding: 5rem 1rem;
            animation: rise 0.4s ease both;
        }
        .no-data .big { font-size: 3rem; margin-bottom: 1rem; }
        .no-data h2 { font-family: 'Clash Display', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .no-data p  { color: var(--muted); margin-bottom: 1.5rem; }
        .no-data a  {
            display: inline-block;
            background: var(--ink); color: var(--bg);
            text-decoration: none; border-radius: 12px;
            padding: 0.8rem 1.6rem;
            font-family: 'Clash Display', sans-serif; font-weight: 600;
            transition: background 0.2s;
        }
        .no-data a:hover { background: var(--rust); }
    </style>
</head>
<body>
<div class="page">

    <div class="top-bar">
        <div class="logo-mark">Spend<em>Wise</em></div>
        <a href="/" class="back-link">← Add Expense</a>
    </div>

    <h1 class="page-title">Your Expenses</h1>
    <p class="page-sub">Last 3 months · latest month on top · oldest auto-removed</p>

    <div class="notice">
        🔄 Expenses older than 3 months are automatically deleted whenever you add a new entry.
    </div>

    <div id="root">
        <div class="loader"><div class="spinner"></div><p>Loading your data…</p></div>
    </div>

</div>

<script>
const CAT_ICONS = {
    Food:"🍔", Transport:"🚗", Shopping:"🛍️",
    Bills:"📄", Health:"💊", Entertainment:"🎬", Other:"📦"
};

async function loadDashboard() {
    const root = document.getElementById('root');
    try {
        const res  = await fetch('/api/expenses');
        const data = await res.json();

        const hasAny = data.some(m => m.expenses.length > 0);
        if (!hasAny) {
            root.innerHTML = `
                <div class="no-data">
                    <div class="big">💸</div>
                    <h2>No expenses yet</h2>
                    <p>Start tracking your spending today.</p>
                    <a href="/">Add your first expense →</a>
                </div>`;
            return;
        }

        root.innerHTML = data.map((m, i) => buildMonth(m, i)).join('');

    } catch(e) {
        root.innerHTML = `
            <div class="no-data">
                <div class="big">⚠️</div>
                <h2>Could not load data</h2>
                <p>Make sure Flask is running with <code>python app.py</code></p>
            </div>`;
    }
}

function buildMonth(m, order) {
    const delay = (order * 0.1).toFixed(2);

    // Stats strip
    const stats = `
        <div class="stats-strip">
            <div class="stat-box">
                <div class="stat-lbl">Total Spent</div>
                <div class="stat-val rust">₹${m.total.toFixed(2)}</div>
            </div>
            <div class="stat-box">
                <div class="stat-lbl">Transactions</div>
                <div class="stat-val gold">${m.count}</div>
            </div>
            <div class="stat-box">
                <div class="stat-lbl">Avg per Entry</div>
                <div class="stat-val sage">₹${m.avg.toFixed(0)}</div>
            </div>
        </div>`;

    // Category pills
    const pills = Object.entries(m.categories).map(([cat, amt]) =>
        `<div class="cat-pill">${CAT_ICONS[cat] || '📦'} ${cat}: <b>₹${amt.toFixed(2)}</b></div>`
    ).join('');
    const catRow = pills ? `<div class="cat-row">${pills}</div>` : '';

    // Expense rows
    const rows = m.expenses.length
        ? m.expenses.map(e => `
            <div class="exp-row" id="row-${e.id}">
                <div class="exp-left">
                    <div class="exp-icon">${CAT_ICONS[e.category] || '📦'}</div>
                    <div>
                        <div class="exp-name">${e.item}</div>
                        <div class="exp-meta">${e.category} · ${e.date}</div>
                    </div>
                </div>
                <div class="exp-right">
                    <div class="exp-amount">₹${e.amount.toFixed(2)}</div>
                    <button class="del-btn" onclick="deleteExpense('${e.id}')">✕</button>
                </div>
            </div>`).join('')
        : `<div class="empty"><div class="big">🗓️</div><p>No expenses recorded this month.</p></div>`;

    const badge = m.is_current ? `<span class="current-tag">This Month</span>` : '';

    return `
        <div class="month-section" style="animation-delay:${delay}s">
            <div class="month-head">
                <div class="month-name-wrap">
                    <span class="month-name">${m.month}</span>${badge}
                </div>
                <div class="month-total-big">₹${m.total.toFixed(2)}</div>
            </div>
            ${stats}
            ${catRow}
            <div class="exp-table">${rows}</div>
        </div>`;
}

async function deleteExpense(id) {
    if (!confirm('Delete this expense?')) return;
    try {
        await fetch(`/api/delete/${id}`, { method: 'DELETE' });
        document.getElementById(`row-${id}`)?.remove();
        // Reload to refresh totals
        loadDashboard();
    } catch {
        alert('Could not delete. Is Flask running?');
    }
}

loadDashboard();
</script>
</body>
</html>
